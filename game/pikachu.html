<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikachu Classic — Ktap Arcade</title>
  <meta name="description" content="Game Pikachu Onet classic: nối thú cưng, tự động tạo màn, lưu điểm local." />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .pika-page { padding: 28px 0 80px; }
    .pika-shell {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .pika-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .pika-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
    .pika-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pika-stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pika-stat span { color: var(--accent); }

    .pika-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pika-controls .btn { padding: 8px 16px; font-size: 0.85rem; }

    .pika-board-wrap {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      align-self: center;
      user-select: none;
    }
    .pika-board {
      display: grid;
      gap: 6px;
      position: relative;
      z-index: 1;
    }
    .pika-cell {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      cursor: pointer;
      background: var(--bg-alt);
      border: 2px solid var(--border);
      transition: transform 0.1s, border-color 0.1s, background 0.1s;
    }
    .pika-cell:hover:not(.empty) { border-color: var(--accent); transform: scale(1.05); }
    .pika-cell.selected { background: var(--accent-light); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,93,4,.15); }
    .pika-cell.matched { animation: popOut 0.25s ease forwards; }
    .pika-cell.hint { animation: hintPulse 1s ease infinite; }
    .pika-cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }

    @keyframes popOut {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    @keyframes hintPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(232,93,4,.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 0 8px rgba(232,93,4,0); }
    }

    .pika-line-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .pika-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 200;
    }
    .pika-toast.show { opacity: 1; }

    .pika-progress {
      width: 100%;
      height: 6px;
      background: var(--bg-alt);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .pika-progress__bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ffb347);
      width: 100%;
      transition: width 0.2s linear;
    }

    @media (max-width: 600px) {
      .pika-cell { width: 36px; height: 36px; font-size: 1.2rem; }
      .pika-board { gap: 4px; }
    }
  </style>
</head>
<body>
  <main class="pika-page">
    <div class="container pika-shell">
      <div class="pika-header">
        <h1 class="pika-title">⚡ Pikachu Classic</h1>
        <div class="pika-stats">
          <div class="pika-stat">Level <span id="levelStat">1</span></div>
          <div class="pika-stat">Điểm <span id="scoreStat">0</span></div>
          <div class="pika-stat">Cao nhất <span id="highStat">0</span></div>
        </div>
      </div>

      <div class="pika-progress">
        <div class="pika-progress__bar" id="timeBar"></div>
      </div>

      <div class="pika-controls">
        <button class="btn btn--primary" id="restartBtn">🔄 Chơi lại</button>
        <button class="btn btn--ghost" id="shuffleBtn">🔀 Xáo trộn</button>
        <button class="btn btn--ghost" id="hintBtn">💡 Gợi ý</button>
        <button class="btn btn--ghost" id="backBtn">← Quay lại</button>
      </div>

      <div class="pika-board-wrap" id="boardWrap">
        <canvas class="pika-line-layer" id="lineLayer"></canvas>
        <div class="pika-board" id="board"></div>
      </div>
    </div>
  </main>

  <div class="pika-toast" id="toast"></div>

  <script src="../assets/js/shared.js"></script>
  <script>
    /* ========== CONFIG ========== */
    const ANIMALS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🦆','🦉','🐴','🦄','🐝','🐞'];
    const BASE_TIME = 180; // seconds per level
    const BOARD_W = 10;
    const BOARD_H = 8;

    /* ========== STATE ========== */
    let level = 1;
    let score = 0;
    let highScore = 0;
    let timeLeft = BASE_TIME;
    let timerId = null;
    let grid = []; // 2D array of animal strings or null
    let selected = null;
    let locked = false;
    let remainingPairs = 0;

    /* ========== DOM ========== */
    const board = document.getElementById('board');
    const boardWrap = document.getElementById('boardWrap');
    const lineLayer = document.getElementById('lineLayer');
    const ctx = lineLayer.getContext('2d');
    const levelStat = document.getElementById('levelStat');
    const scoreStat = document.getElementById('scoreStat');
    const highStat = document.getElementById('highStat');
    const timeBar = document.getElementById('timeBar');
    const toast = document.getElementById('toast');

    /* ========== INIT ========== */
    function loadHighScore() {
      highScore = parseInt(localStorage.getItem('pikachu_highscore') || '0', 10) || 0;
      highStat.textContent = highScore;
    }
    function saveHighScore() {
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('pikachu_highscore', highScore);
        highStat.textContent = highScore;
        showToast('🎉 Kỷ lục mới: ' + highScore);
      }
    }

    function initGame() {
      level = 1;
      score = 0;
      loadHighScore();
      startLevel();
    }

    function startLevel() {
      selected = null;
      locked = false;
      timeLeft = Math.max(30, BASE_TIME - (level - 1) * 10);
      buildBoard();
      renderBoard();
      updateStats();
      resizeCanvas();
      startTimer();
      ensureSolvable();
      showToast(`Level ${level} — Nối các cặp giống nhau!`);
    }

    function buildBoard() {
      const totalCells = BOARD_W * BOARD_H;
      const pairs = totalCells / 2;
      const pool = [];
      for (let i = 0; i < pairs; i++) {
        const animal = ANIMALS[i % ANIMALS.length];
        pool.push(animal, animal);
      }
      // Shuffle
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      grid = [];
      for (let y = 0; y < BOARD_H; y++) {
        const row = [];
        for (let x = 0; x < BOARD_W; x++) {
          row.push(pool[y * BOARD_W + x]);
        }
        grid.push(row);
      }
      remainingPairs = pairs;
    }

    function renderBoard() {
      board.innerHTML = '';
      board.style.gridTemplateColumns = `repeat(${BOARD_W}, 1fr)`;
      for (let y = 0; y < BOARD_H; y++) {
        for (let x = 0; x < BOARD_W; x++) {
          const cell = document.createElement('div');
          cell.className = 'pika-cell' + (grid[y][x] ? '' : ' empty');
          cell.dataset.x = x;
          cell.dataset.y = y;
          cell.textContent = grid[y][x] || '';
          cell.addEventListener('click', () => onCellClick(x, y));
          board.appendChild(cell);
        }
      }
    }

    function getCellEl(x, y) {
      return board.querySelector(`.pika-cell[data-x="${x}"][data-y="${y}"]`);
    }

    function onCellClick(x, y) {
      if (locked || !grid[y][x]) return;
      const cell = getCellEl(x, y);
      if (selected && selected.x === x && selected.y === y) {
        cell.classList.remove('selected');
        selected = null;
        return;
      }
      if (!selected) {
        selected = { x, y };
        cell.classList.add('selected');
        return;
      }
      const first = selected;
      const second = { x, y };
      if (grid[first.y][first.x] !== grid[second.y][second.x]) {
        getCellEl(first.x, first.y).classList.remove('selected');
        selected = { x, y };
        cell.classList.add('selected');
        return;
      }
      const path = findPath(first, second);
      if (path) {
        locked = true;
        drawPath(path);
        setTimeout(() => {
          grid[first.y][first.x] = null;
          grid[second.y][second.x] = null;
          getCellEl(first.x, first.y).classList.add('matched', 'empty');
          getCellEl(second.x, second.y).classList.add('matched', 'empty');
          getCellEl(first.x, first.y).classList.remove('selected');
          getCellEl(first.x, first.y).textContent = '';
          getCellEl(second.x, second.y).textContent = '';
          clearCanvas();
          selected = null;
          locked = false;
          remainingPairs--;
          const timeBonus = Math.max(5, 20 - level * 2);
          score += 10 * level + timeBonus;
          timeLeft = Math.min(timeLeft + 2, BASE_TIME + level * 10);
          updateStats();
          if (remainingPairs <= 0) {
            saveHighScore();
            level++;
            setTimeout(startLevel, 600);
          } else {
            ensureSolvable();
          }
        }, 220);
      } else {
        cell.classList.add('shake');
        setTimeout(() => cell.classList.remove('shake'), 250);
      }
    }

    /* ========== PATH FINDING (Onet) ========== */
    function findPath(a, b) {
      // BFS: state = {x, y, dir, turns, parent}
      // dir: 0=up,1=right,2=down,3=left, -1=start
      const visited = new Map();
      const q = [];
      const dirs = [{x:0,y:-1},{x:1,y:0},{x:0,y:1},{x:-1,y:0}];
      const key = (x, y, dir) => `${x},${y},${dir}`;
      // Limit search to one cell outside the board
      const inBounds = (x, y) => x >= -1 && x <= BOARD_W && y >= -1 && y <= BOARD_H;

      for (let d = 0; d < 4; d++) {
        const nx = a.x + dirs[d].x;
        const ny = a.y + dirs[d].y;
        if (!inBounds(nx, ny)) continue;
        if (isPassable(nx, ny, a, b)) {
          const k = key(nx, ny, d);
          visited.set(k, {x:nx, y:ny, dir:d, turns:0, parent:null, start:a});
          q.push(visited.get(k));
        }
      }
      while (q.length) {
        const cur = q.shift();
        if (cur.x === b.x && cur.y === b.y) {
          // reconstruct path
          const path = [a];
          let node = cur;
          const stack = [];
          while (node && !(node.x === a.x && node.y === a.y)) {
            stack.push({x: node.x, y: node.y});
            node = node.parent;
          }
          while (stack.length) path.push(stack.pop());
          return path;
        }
        for (let d = 0; d < 4; d++) {
          const nx = cur.x + dirs[d].x;
          const ny = cur.y + dirs[d].y;
          if (!inBounds(nx, ny)) continue;
          if (!isPassable(nx, ny, a, b)) continue;
          const newTurns = cur.dir === d ? cur.turns : cur.turns + 1;
          if (newTurns > 2) continue;
          const k = key(nx, ny, d);
          if (visited.has(k)) continue;
          visited.set(k, {x:nx, y:ny, dir:d, turns:newTurns, parent:cur, start:a});
          q.push(visited.get(k));
        }
      }
      return null;
    }

    function isPassable(x, y, start, end) {
      if (x === start.x && y === start.y) return true;
      if (x === end.x && y === end.y) return true;
      if (x < 0 || y < 0 || x >= BOARD_W || y >= BOARD_H) return true; // outside board is passable
      return grid[y][x] === null;
    }

    /* ========== DRAW PATH ========== */
    function drawPath(path) {
      if (path.length < 2) return;
      clearCanvas();
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#e85d04';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = 'rgba(232,93,4,.45)';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      const cells = Array.from(board.children).filter(el => !el.classList.contains('empty'));
      const gap = parseInt(getComputedStyle(board).gap) || 6;
      const firstEl = getCellEl(path[0].x, path[0].y);
      const rect = board.getBoundingClientRect();
      const wrapRect = boardWrap.getBoundingClientRect();
      const pad = 16; // padding of wrap
      function pos(p) {
        const el = getCellEl(p.x, p.y);
        if (el) {
          const r = el.getBoundingClientRect();
          return {
            x: r.left - wrapRect.left + r.width / 2,
            y: r.top - wrapRect.top + r.height / 2
          };
        }
        // Outside board: estimate position
        const cellW = (rect.width - gap * (BOARD_W - 1)) / BOARD_W;
        const cellH = (rect.height - gap * (BOARD_H - 1)) / BOARD_H;
        return {
          x: pad + p.x * (cellW + gap) + cellW / 2,
          y: pad + p.y * (cellH + gap) + cellH / 2
        };
      }
      const start = pos(path[0]);
      ctx.moveTo(start.x, start.y);
      for (let i = 1; i < path.length; i++) {
        const p = pos(path[i]);
        ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, lineLayer.width, lineLayer.height);
    }

    function resizeCanvas() {
      const r = boardWrap.getBoundingClientRect();
      lineLayer.width = r.width;
      lineLayer.height = r.height;
    }

    /* ========== SOLVABILITY ========== */
    function ensureSolvable() {
      const hint = findAnyHint();
      if (!hint) {
        // No possible moves -> shuffle current tiles
        shuffleBoard();
        // Try again
        if (!findAnyHint()) ensureSolvable();
      }
    }

    function findAnyHint() {
      const positions = {};
      for (let y = 0; y < BOARD_H; y++) {
        for (let x = 0; x < BOARD_W; x++) {
          const val = grid[y][x];
          if (!val) continue;
          if (!positions[val]) positions[val] = [];
          positions[val].push({x, y});
        }
      }
      for (const val in positions) {
        const arr = positions[val];
        for (let i = 0; i < arr.length; i++) {
          for (let j = i + 1; j < arr.length; j++) {
            if (findPath(arr[i], arr[j])) return [arr[i], arr[j]];
          }
        }
      }
      return null;
    }

    function shuffleBoard() {
      if (selected) {
        selected = null;
        clearCanvas();
      }
      const tiles = [];
      for (let y = 0; y < BOARD_H; y++) {
        for (let x = 0; x < BOARD_W; x++) {
          if (grid[y][x]) tiles.push(grid[y][x]);
        }
      }
      for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
      }
      let idx = 0;
      for (let y = 0; y < BOARD_H; y++) {
        for (let x = 0; x < BOARD_W; x++) {
          if (grid[y][x]) grid[y][x] = tiles[idx++];
        }
      }
      renderBoard();
      showToast('🔀 Đã xáo trộn bàn cờ!');
    }

    /* ========== TIMER & STATS ========== */
    function startTimer() {
      stopTimer();
      updateTimeBar();
      timerId = setInterval(() => {
        timeLeft--;
        updateTimeBar();
        if (timeLeft <= 0) {
          stopTimer();
          gameOver();
        }
      }, 1000);
    }
    function stopTimer() {
      if (timerId) clearInterval(timerId);
      timerId = null;
    }
    function updateTimeBar() {
      const max = Math.max(BASE_TIME, timeLeft);
      const pct = Math.max(0, (timeLeft / max) * 100);
      timeBar.style.width = pct + '%';
    }
    function updateStats() {
      levelStat.textContent = level;
      scoreStat.textContent = score;
      highStat.textContent = highScore;
    }
    function gameOver() {
      locked = true;
      saveHighScore();
      showToast(`⏰ Hết giờ! Điểm: ${score}. Chơi lại nhé!`);
      setTimeout(() => {
        if (confirm(`Hết giờ! Điểm của bạn: ${score}. Chơi lại?`)) {
          initGame();
        }
      }, 400);
    }

    /* ========== UI HELPERS ========== */
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    document.getElementById('restartBtn').addEventListener('click', () => {
      stopTimer();
      if (confirm('Bạn muốn chơi lại từ đầu?')) initGame();
      else startTimer();
    });
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      if (locked) return;
      score = Math.max(0, score - 50);
      updateStats();
      shuffleBoard();
      ensureSolvable();
    });
    document.getElementById('hintBtn').addEventListener('click', () => {
      if (locked) return;
      const hint = findAnyHint();
      if (!hint) {
        showToast('Không còn nước đi, tự động xáo!');
        shuffleBoard();
        return;
      }
      score = Math.max(0, score - 30);
      updateStats();
      hint.forEach(p => getCellEl(p.x, p.y).classList.add('hint'));
      setTimeout(() => {
        hint.forEach(p => getCellEl(p.x, p.y).classList.remove('hint'));
      }, 1200);
    });
    document.getElementById('backBtn').addEventListener('click', () => {
      location.href = 'index.html';
    });

    window.addEventListener('resize', () => {
      resizeCanvas();
    });

    /* ========== BOOT ========== */
    window.addEventListener('load', () => {
      resizeCanvas();
      initGame();
    });
  </script>
</body>
</html>
