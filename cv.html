<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Trần Anh Tuấn · Backend / Full-stack Developer</title>
  <meta
    name="description"
    content="Bilingual CV of Trần Anh Tuấn, a backend and full-stack developer working with Python, APIs, data crawling, cloud, and DevOps."
  />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Merriweather:ital,wght@0,400;0,700;1,400&amp;display=swap"
    rel="stylesheet"
  />
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .cv-page {
      padding: 2rem 1rem 4rem;
    }

    .cv-shell {
      max-width: 1140px;
      margin: 0 auto;
    }

    .cv-toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .cv-toolbar__control {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0 0.9rem;
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      box-shadow: 0 8px 22px rgba(19, 16, 10, 0.08);
      backdrop-filter: blur(10px);
    }

    [data-theme="dark"] .cv-toolbar__control {
      background: rgba(28, 28, 26, 0.92);
    }

    .cv-toolbar__label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .cv-language-select {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding-right: 0.75rem;
      cursor: pointer;
      min-width: 110px;
    }

    .cv-language-select:focus {
      outline: none;
    }

    .cv-download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      min-height: 42px;
      padding: 0 1rem;
      border-radius: 10px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      box-shadow: 0 10px 24px rgba(232, 93, 4, 0.22);
    }

    .cv-download-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(232, 93, 4, 0.3);
    }

    .cv-download-btn:disabled {
      opacity: 0.7;
      cursor: progress;
      transform: none;
      box-shadow: none;
    }

    .cv-sheet-wrap {
      display: flex;
      justify-content: center;
    }

    .cv-sheet {
      width: min(100%, 210mm);
      min-height: 297mm;
      background: #fff;
      color: #17140f;
      border: 1px solid #e8ded0;
      border-radius: 24px;
      box-shadow: 0 30px 70px rgba(27, 20, 9, 0.1);
      overflow: hidden;
      color-scheme: light;
    }

    .cv-sheet__grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 297mm;
    }

    .cv-sidebar {
      background:
        radial-gradient(circle at top left, rgba(232, 93, 4, 0.12), transparent 42%),
        linear-gradient(180deg, #f8f3eb 0%, #f3ece2 100%);
      border-right: 1px solid #eadfce;
      padding: 1.8rem 1.4rem 1.55rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .cv-profile {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .cv-avatar {
      width: 84px;
      height: 84px;
      border-radius: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e85d04 0%, #f59a52 100%);
      color: #fff;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      box-shadow: 0 14px 30px rgba(232, 93, 4, 0.22);
    }

    .cv-profile__name {
      font-size: 1.45rem;
      line-height: 1.1;
      letter-spacing: -0.04em;
      font-weight: 800;
      color: #17140f;
    }

    .cv-profile__title {
      font-size: 0.86rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: #b04b10;
    }

    .cv-profile__location {
      font-size: 0.9rem;
      color: #655a4b;
      line-height: 1.5;
    }

    .cv-sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      break-inside: avoid;
    }

    .cv-sidebar-section__label,
    .cv-main-section__eyebrow {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #b04b10;
    }

    .cv-contact-list,
    .cv-interest-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .cv-contact-item,
    .cv-interest-item {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      font-size: 0.82rem;
      line-height: 1.45;
      color: #4f4537;
      word-break: break-word;
    }

    .cv-contact-item a {
      color: inherit;
      text-decoration: none;
    }

    .cv-contact-item a:hover {
      color: #b04b10;
    }

    .cv-contact-item__icon,
    .cv-interest-item__icon {
      font-style: normal;
      flex-shrink: 0;
      width: 1rem;
      margin-top: 0.05rem;
    }

    .cv-skill-group,
    .cv-mini-group,
    .cv-education-item {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      break-inside: avoid;
    }

    .cv-skill-group__title,
    .cv-mini-group__title,
    .cv-education-item__degree {
      font-size: 0.82rem;
      font-weight: 700;
      color: #17140f;
    }

    .cv-pill-list,
    .cv-tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.38rem;
    }

    .cv-pill {
      display: inline-flex;
      align-items: center;
      min-height: 1.7rem;
      padding: 0 0.65rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid #eadfce;
      font-size: 0.72rem;
      line-height: 1.3;
      color: #30281f;
      font-weight: 600;
    }

    .cv-pill--highlighted {
      background: #e85d04;
      border-color: #e85d04;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 4px 10px rgba(232, 93, 4, 0.2);
    }

    .cv-pill--soft {
      background: rgba(232, 93, 4, 0.09);
      border-color: transparent;
      color: #8a3f12;
    }

    .cv-education-item__meta,
    .cv-education-item__school,
    .cv-mini-text {
      font-size: 0.78rem;
      line-height: 1.45;
      color: #5f5547;
    }

    .cv-main {
      padding: 1.75rem 1.85rem 1.55rem 1.95rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .cv-main-section {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      break-inside: avoid;
    }

    .cv-main-section__heading {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .cv-main-section__title {
      font-size: 1.14rem;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #17140f;
    }

    .cv-summary-text {
      font-size: 0.92rem;
      line-height: 1.66;
      color: #30281f;
    }

    .cv-summary-text + .cv-summary-text {
      margin-top: 0.25rem;
    }

    .cv-highlight-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .cv-highlight-pill {
      display: inline-flex;
      align-items: center;
      min-height: 1.9rem;
      padding: 0 0.8rem;
      border-radius: 999px;
      background: #fff4ec;
      border: 1px solid #f3ddcb;
      color: #8a3f12;
      font-size: 0.74rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .cv-timeline {
      display: flex;
      flex-direction: column;
      gap: 0.82rem;
    }

    .cv-entry {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.35rem 1rem;
      padding-left: 1.05rem;
      border-left: 2px solid #efdfd0;
      break-inside: avoid;
    }

    .cv-entry::before {
      content: "";
      position: absolute;
      left: -6px;
      top: 0.32rem;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e85d04;
      box-shadow: 0 0 0 4px #fff4ec;
    }

    .cv-entry__role {
      font-size: 0.96rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #17140f;
    }

    .cv-entry__period {
      font-size: 0.76rem;
      line-height: 1.4;
      font-weight: 700;
      color: #7a6d5d;
      text-align: right;
      white-space: nowrap;
    }

    .cv-entry__company {
      grid-column: 1 / span 2;
      font-size: 0.83rem;
      line-height: 1.5;
      color: #b04b10;
      font-weight: 700;
    }

    .cv-entry__desc {
      grid-column: 1 / span 2;
    }

    .cv-entry__desc ul {
      padding-left: 1.05rem;
      display: flex;
      flex-direction: column;
      gap: 0.24rem;
    }

    .cv-entry__desc li {
      font-size: 0.83rem;
      line-height: 1.5;
      color: #30281f;
    }

    .cv-entry__desc li::marker {
      color: #e85d04;
    }

    .cv-entry__tags {
      grid-column: 1 / span 2;
      display: flex;
      flex-wrap: wrap;
      gap: 0.32rem;
    }

    .cv-tag {
      display: inline-flex;
      align-items: center;
      min-height: 1.6rem;
      padding: 0 0.58rem;
      border-radius: 999px;
      background: #faf5ef;
      border: 1px solid #ecdfd1;
      font-size: 0.69rem;
      line-height: 1.3;
      font-weight: 700;
      color: #5a4d3f;
    }

    .cv-project-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.85rem;
    }

    .cv-project-card {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      padding: 0.85rem 0.9rem;
      border-radius: 16px;
      border: 1px solid #eadfce;
      background: linear-gradient(180deg, #fffdfa 0%, #fbf7f2 100%);
      break-inside: avoid;
    }

    .cv-project-card--featured {
      grid-column: span 2;
    }

    .cv-project-card__top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.7rem;
    }

    .cv-project-card__name {
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #17140f;
    }

    .cv-project-card__meta {
      font-size: 0.74rem;
      line-height: 1.45;
      color: #7a6d5d;
    }

    .cv-project-card__facts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.32rem;
    }

    .cv-project-card__fact {
      display: inline-flex;
      align-items: center;
      min-height: 1.45rem;
      padding: 0 0.48rem;
      border-radius: 999px;
      background: #fff3e6;
      color: #9a4b16;
      font-size: 0.66rem;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .cv-project-card__link {
      flex-shrink: 0;
      color: #b04b10;
      font-size: 0.78rem;
      font-weight: 700;
      text-decoration: none;
    }

    .cv-project-card__link:hover {
      color: #8a3f12;
    }

    .cv-project-card__desc {
      font-size: 0.8rem;
      line-height: 1.52;
      color: #30281f;
    }

    .cv-footer-note {
      font-size: 0.74rem;
      line-height: 1.45;
      color: #7a6d5d;
    }

    body.cv-exporting .cv-sheet {
      border-radius: 0;
      box-shadow: none;
      border-color: transparent;
    }

    @media (max-width: 980px) {
      .cv-toolbar {
        justify-content: stretch;
      }

      .cv-toolbar__control,
      .cv-download-btn {
        flex: 1 1 220px;
      }

      .cv-sheet__grid {
        grid-template-columns: 1fr;
      }

      .cv-sidebar {
        border-right: none;
        border-bottom: 1px solid #eadfce;
      }

      .cv-main {
        padding: 1.6rem 1.25rem 1.45rem;
      }
    }

    @media (max-width: 720px) {
      .cv-page {
        padding: 1.25rem 0 3rem;
      }

      .cv-shell {
        padding: 0 0.75rem;
      }

      .cv-sheet {
        border-radius: 0;
      }

      .cv-profile {
        gap: 0.55rem;
      }

      .cv-avatar {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        font-size: 1.7rem;
      }

      .cv-project-grid {
        grid-template-columns: 1fr;
      }

      .cv-project-card--featured {
        grid-column: auto;
      }

      .cv-entry {
        grid-template-columns: 1fr;
      }

      .cv-entry__period,
      .cv-entry__company,
      .cv-entry__desc,
      .cv-entry__tags {
        grid-column: auto;
      }

      .cv-entry__period {
        text-align: left;
      }
    }

    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      body {
        background: #fff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .header,
      .footer,
      .cv-toolbar {
        display: none !important;
      }

      .cv-page {
        padding: 0;
      }

      .cv-sheet-wrap {
        display: block;
      }

      .cv-sheet {
        width: 100%;
        min-height: auto;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }

      .cv-sheet__grid {
        min-height: auto;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/css/cv-print.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <span class="logo__icon">✦</span>
        <span class="logo__text">Tuanta</span>
      </a>

      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link" id="navHome">Trang chủ</a>
        <a href="index.html#posts" class="nav__link" id="navPosts">Bài viết</a>
        <a href="index.html#about" class="nav__link" id="navAbout">Về tôi</a>
        <a href="index.html#contact" class="nav__link" id="navContact">Liên hệ</a>
        <a href="game/index.html" class="nav__link" id="navGame">Game</a>
        <a href="cv.html" class="nav__link nav__link--cv active" id="navCv">CV</a>
      </nav>

      <div class="header__actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Chuyển giao diện">
          <span class="theme-toggle__icon">☾</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Mở menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="cv-page">
    <div class="cv-shell">
      <div class="cv-toolbar">
        <label class="cv-toolbar__control" for="cvLangSelect">
          <span class="cv-toolbar__label" id="cvLanguageLabel">Language</span>
          <select class="cv-language-select" id="cvLangSelect" aria-labelledby="cvLanguageLabel">
            <option value="en">English</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </label>

        <button class="cv-download-btn" id="cvDownloadBtn" type="button">
          ⬇ Download PDF
        </button>
      </div>

      <div class="cv-sheet-wrap">
        <article class="cv-sheet" id="cvSheet" aria-live="polite"></article>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p id="cvFooterText">© 2026 <strong>tuanta</strong> · Được xây dựng với ❤️ và HTML thuần</p>
      <div class="footer__links">
        <a href="index.html" id="cvFooterHome">Trang chủ</a>
        <a href="index.html#posts" id="cvFooterPosts">Bài viết</a>
      </div>
    </div>
  </footer>

  <article class="cv-print-root" id="cvPrintRoot" aria-hidden="true"></article>

  <script src="assets/js/cv-data.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.20/build/pdfmake.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.20/build/vfs_fonts.js"></script>
  <script src="assets/js/cv-pdf.js"></script>
  <script src="assets/js/cv.js"></script>
</body>
</html>
